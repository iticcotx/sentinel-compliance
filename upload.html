<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Upload document</title>
<style>
  body{font-family:system-ui,-apple-system,Segoe UI,Arial,sans-serif;margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:18px;
    background:radial-gradient(900px 500px at 50% -5%,#134e4a,#05222a 60%,#021015);color:#e9eef3}
  .card{background:#111a22;border:1px solid #1e2b36;border-radius:20px;padding:26px;max-width:440px;width:100%;box-shadow:0 30px 80px rgba(0,0,0,.5)}
  h1{font-size:19px;margin:0 0 2px;color:#5eead4}.sub{color:#7fb8b0;font-size:13px;margin-bottom:20px}
  .meta{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);border-radius:12px;padding:12px 14px;margin-bottom:18px;font-size:14px}.meta b{color:#fff}
  label{display:block;font-size:12px;color:#a4b3c0;margin:0 0 8px}
  input[type=file]{width:100%;color:#e9eef3;font-size:14px;background:rgba(255,255,255,.06);padding:12px;border-radius:10px;border:1px solid rgba(255,255,255,.12)}
  button{margin-top:18px;width:100%;padding:14px;border:none;border-radius:12px;background:linear-gradient(135deg,#14b8a6,#0f766e);color:#fff;font-weight:700;font-size:15px}
  button:disabled{opacity:.5}.msg{margin-top:16px;font-size:14px;font-weight:600;min-height:20px}
</style></head>
<body>
  <div class="card">
    <h1>Sentinel — Upload document</h1>
    <div class="sub">Wellness &amp; Care Group of Texas</div>
    <div class="meta" id="meta">Loading…</div>
    <label>Choose a file or take a photo of the document</label>
    <input type="file" id="file" accept="application/pdf,image/*" capture="environment">
    <button id="go">Upload</button>
    <div class="msg" id="msg"></div>
  </div>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="data.js"></script>
<script>
  var q = new URLSearchParams(location.search), id = q.get("item");
  var items = (window.SENTINEL_SEED && window.SENTINEL_SEED.items) || [];
  var it = items.filter(function(x){return x.id===id;})[0];
  document.getElementById("meta").innerHTML = it ? ("<b>"+it.category+"</b><br>"+it.entity) : ("Item: "+(id||"(none)"));
  var SB = (window.SUPA && window.SUPA.url) ? supabase.createClient(window.SUPA.url, window.SUPA.anon) : null;
  document.getElementById("go").onclick = async function(){
    var f = document.getElementById("file").files[0], m = document.getElementById("msg"), b = document.getElementById("go");
    if(!f){ m.style.color="#fca5a5"; m.textContent="Please choose a file first."; return; }
    if(!SB){ m.style.color="#fca5a5"; m.textContent="Cloud not configured (supabase-config.js)."; return; }
    m.style.color="#9fd9d0"; m.textContent="Uploading…"; b.disabled=true;
    try {
      var safe = f.name.replace(/[^A-Za-z0-9._-]/g,"_");
      var path = id + "/" + Date.now() + "_" + safe;
      var up = await SB.storage.from(window.SUPA.bucket).upload(path, f, { upsert:true, contentType:f.type||"application/octet-stream" });
      if(up.error) throw up.error;
      var url = SB.storage.from(window.SUPA.bucket).getPublicUrl(path).data.publicUrl;
      var ins = await SB.from("uploads").upsert({ item_id:id, url:url, name:f.name });
      if(ins.error) throw ins.error;
      m.style.color="#6ee7b7"; m.textContent="✓ Uploaded. It now shows in Sentinel for this item.";
      b.disabled=false;
    } catch(e){ m.style.color="#fca5a5"; m.textContent="Failed: " + (e.message||e); b.disabled=false; }
  };
</script>
</body></html>
