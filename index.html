<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sentinel — Compliance Command Center · WCGTX</title>
<meta name="description" content="Sentinel — multi-facility healthcare compliance command center for Wellness & Care Group of Texas.">
<!-- Favicon: Sentinel shield (inline SVG data URI) -->
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0' y1='0' x2='1' y2='1'%3E%3Cstop offset='0' stop-color='%2314b8a6'/%3E%3Cstop offset='1' stop-color='%230f766e'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M24 3l16 6v11c0 10-7 18-16 22C15 38 8 30 8 20V9z' fill='url(%23g)'/%3E%3Cpath d='M14 25h5l3-8 4 14 3-6h5' fill='none' stroke='%23fff' stroke-width='2.4' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f766e">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Sentinel">
<link rel="apple-touch-icon" href="icon.svg">
<link rel="stylesheet" href="styles.css?v=cloud48">
</head>
<body>

<!-- ===================== SVG symbol defs (logo + icons) ===================== -->
<svg width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <linearGradient id="sentinelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#14b8a6"/><stop offset="1" stop-color="#0f766e"/>
    </linearGradient>
    <symbol id="logo-sentinel" viewBox="0 0 48 48">
      <path d="M24 3l16 6v11c0 10-7 18-16 22C15 38 8 30 8 20V9z" fill="url(#sentinelGrad)"/>
      <path d="M14 25h5l3-8 4 14 3-6h5" fill="none" stroke="#fff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
    </symbol>
  </defs>
</svg>

<!-- ===================== AUTH OVERLAY ===================== -->
<div class="auth-wrap" id="authWrap">
  <div class="auth-card" id="authCard"><!-- filled by JS (login or setup) --></div>
</div>

<!-- ===================== APP ===================== -->
<main class="app hidden" id="app">
  <header class="topbar glass">
    <div class="logo-lockup" id="homeLogo" title="Home — reset view" style="cursor:pointer">
      <svg class="mark"><use href="#logo-sentinel"/></svg>
      <div>
        <div class="name"><b>Sentinel</b></div>
        <div class="tag">Compliance Command Center</div>
      </div>
    </div>
    <div class="spacer"></div>
    <button class="icon-btn" id="btnSearch" title="Global search (Ctrl/⌘ + K)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="M21 21l-4-4"/></svg>
      <span>Search</span>
    </button>
    <button class="icon-btn" id="btnInsights" title="Analytics & insights">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 3v18h18"/><path d="M7 14l3-3 3 3 5-6"/></svg>Insights
    </button>
    <button class="icon-btn" id="btnContacts" title="Facility contacts directory">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M16 21v-2a4 4 0 00-4-4H6a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 00-3-3.87"/></svg>Contacts
    </button>
    <button class="icon-btn" id="btnBell" title="Alerts & upcoming" style="position:relative">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 10-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg>
      <span id="bellCount" style="position:absolute;top:-6px;right:-6px;background:var(--st-expired);color:#fff;font-size:10px;font-weight:800;min-width:17px;height:17px;border-radius:10px;display:none;align-items:center;justify-content:center;padding:0 4px">0</span>
    </button>
    <button class="icon-btn" id="btnEmail" title="Email this report to your inbox">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="M3 7l9 6 9-6"/></svg>Email me
    </button>
    <button class="icon-btn" id="btnExport" title="Export all to CSV">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 3v12m0 0l4-4m-4 4l-4-4M4 17v2a2 2 0 002 2h12a2 2 0 002-2v-2"/></svg>CSV
    </button>
    <button class="icon-btn" id="btnPrint" title="Print survey-ready binder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 9V3h12v6M6 18H4a2 2 0 01-2-2v-3a2 2 0 012-2h16a2 2 0 012 2v3a2 2 0 01-2 2h-2M6 14h12v7H6z"/></svg>Binder
    </button>
    <button class="icon-btn" id="btnTheme" title="Toggle light / dark" aria-label="Toggle theme">
      <svg id="themeIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
    </button>
    <button class="icon-btn" id="btnLock" title="Lock & sign out">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="5" y="11" width="14" height="10" rx="2"/><path d="M8 11V7a4 4 0 018 0v4"/></svg>
    </button>
  </header>

  <div id="alertBanner"></div>
  <section class="kpi-grid" id="kpiGrid"></section>
  <nav class="tabs" id="tabs"></nav>
  <div class="toolbar glass" id="toolbar"></div>
  <section class="content" id="content"><div class="sk-wrap"><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div><div class="sk-card"></div></div></section>

  <div class="foot">
    Sentinel · generated from <b>WCGTX Physician Roster</b> + facility compliance exports ·
    <span id="genStamp"></span><br>
    Client-side access gate is a deterrent, not encryption — <a id="securityLink">read the security note</a>.<br>
    <div id="footLinks" style="margin-top:6px"></div>
  </div>
</main>

<!-- Generic modal (insights / contacts / audit / command palette) -->
<div class="modal-back" id="modal"><div class="modal" id="modalInner"></div></div>
<div id="printArea"></div>

<!-- Detail drawer -->
<div class="drawer-back" id="drawerBack"></div>
<aside class="drawer" id="drawer" aria-hidden="true"></aside>
<div class="toast" id="toast"></div>

<script src="sha256.js?v=cloud48"></script>
<script src="config.js?v=cloud48"></script>
<!-- Microsoft sign-in gate: no roster data is loaded until the session is verified server-side. -->
<script>
(function () {
  function showSignIn() {
    var c = document.getElementById("authCard");
    c.innerHTML =
      '<div class="logo-lockup"><svg class="mark" style="width:44px;height:44px"><use href="#logo-sentinel"/></svg>' +
      '<div><div class="name" style="color:#fff"><b style="color:#5eead4">Sentinel</b></div>' +
      '<div class="tag" style="color:#7fb8b0">Compliance Command Center</div></div></div>' +
      '<div class="auth-sub" style="margin:16px 0 10px">Wellness &amp; Care Group of Texas</div>' +
      '<button class="btn-primary" id="msSignIn" style="display:flex;align-items:center;justify-content:center;gap:10px">' +
      '<svg width="18" height="18" viewBox="0 0 23 23"><path fill="#f25022" d="M1 1h10v10H1z"/><path fill="#7fba00" d="M12 1h10v10H12z"/><path fill="#00a4ef" d="M1 12h10v10H1z"/><path fill="#ffb900" d="M12 12h10v10H12z"/></svg>Sign in with Microsoft</button>' +
      '<div class="auth-sub" style="margin-top:14px;font-size:12px;opacity:.7">Access is limited to approved staff.</div>';
    document.getElementById("msSignIn").onclick = function () { location.href = "/api/auth-callback"; };
  }
  fetch("/api/session").then(function (r) { return r.ok ? r.json() : null; }).then(function (s) {
    if (!s || !s.authed) { showSignIn(); return; }
    window.SENTINEL_AUTH = s;
    return fetch("/api/data").then(function (r) { return r.ok ? r.json() : null; }).then(function (d) {
      if (!d || !d.items) { showSignIn(); return; }
      window.SENTINEL_SEED = d;
      var sc = document.createElement("script"); sc.src = "app.js?v=cloud48"; document.body.appendChild(sc);
    });
  }).catch(showSignIn);
})();
</script>
</body>
</html>
